<html lang="pt-br">

<head>
    <meta charset="UTF-8" />

    <title>Deverse</title>

<body>

    <header id="cabecalho">
        <!-- LOGO -->
        <div class="logo">
            <button class="botao-logo" data-text="Deverse">
                <span class="texto-botao-real">&nbsp;deverse&nbsp;</span>
                <span aria-hidden="true" class="texto-botao-hover">&nbsp;deverse&nbsp;</span>
            </button>
        </div>
        <div class="nav-filtros">
            <div class="containerfilter">
                <!-- FILTRO -->
                <nav class="navbar">
                    <button id="btnfiltro" class="btn-filtro">Elementos</button>
                </nav>
                <!-- PAINEL OCULTO DO BOTAO DOS FILTROS -->
                <div id="painelfiltro" class="painel-filtro">
                    <div class="painelcoluna1">
                        <button class="filtro ativo" data-filtro="all">All</button>
                        <button class="filtro" data-filtro="buttons">Buttons</button>
                        <button class="filtro" data-filtro="checkboxes">Checkboxes</button>
                        <button class="filtro" data-filtro="cards">Cards</button>
                    </div>
                    <div class="painelcoluna2">
                        <button class="filtro" data-filtro="loaders">Loaders</button>
                        <button class="filtro" data-filtro="forms">Forms</button>
                        <button class="filtro" data-filtro="radio">Radio Buttons</button>
                        <button class="filtro" data-filtro="inputs">Inputs</button>
                    </div>
                </div>
            </div>
            <div class="search-box" id="searchbox">
                <input type="search" placeholder="Pesquisar Elementos..." />
                <button>Pesquisar</button>
            </div>
        </div>
    </header>

    <!-- TEXTO CENTRAL DA PAGINA -->
    <div class="txt-central">
        <p class="txt-maior">
            Biblioteca de Componentes Front-End Prontos para Usar
        </p>
        <p class="txt-menor">
            Copie e cole códigos em HTML e CSS em seus projetos.
        </p>
    </div>

                                    </path>

                                <span class="tooltip">Add an image</span>
                            </label>
                            <input type="file" id="file" name="file" />

            </article>

                            <span class="word">switches</span>
                            <span class="word">cards</span>
                            <span class="word">buttons</span>

                    </div>
                </div>
            </article>

            <article class="card card-6">
            </article>
